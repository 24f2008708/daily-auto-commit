name: Daily Repository Update

permissions:
  contents: write

on:
  schedule:
    - cron: '30 10 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          persist-credentials: true

      - name: Setup Git
        run: |
          git config user.name "DevSync Bot"
          git config user.email "24f2008708@ds.study.iitm.ac.in"

      - name: Daily commit step - 24f2008708@ds.study.iitm.ac.in
        run: |
          echo "Last update: $(date)" >> daily_log.txt
          git add daily_log.txt
          git commit -m "Automated daily update" || echo "No changes"
          git push
